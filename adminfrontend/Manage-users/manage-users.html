<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="manage-users.css">
</head>

<body>
    <div class="module-container">
        <div class="module-header">
            <h2><i class="fas fa-users-cog"></i> Manage Users</h2>
            <button class="btn-primary" onclick="showAddCommitteeModal()">
                <i class="fas fa-plus"></i> Add Committee Member
            </button>
        </div>

        <!-- User Type Tabs -->
        <div class="user-tabs">
            <button class="tab-btn active" onclick="switchUserTab('all')">All Users</button>
            <button class="tab-btn" onclick="switchUserTab('victims')">Victims</button>
            <button class="tab-btn" onclick="switchUserTab('committee')">Committee Members</button>
            <button class="tab-btn" onclick="switchUserTab('blocked')">Blocked Users</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search users by name, email, or role..."
                onkeyup="searchUsers()">
        </div>

        <!-- Users Table -->
        <div class="table-container">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Committee Member Modal -->
    <!-- Add Committee Member Modal -->
    <div class="modal" id="addCommitteeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-tie"></i> Add Committee Member</h3>
                <button class="close-btn" onclick="closeModal('addCommitteeModal')">&times;</button>
            </div>
            <form id="addCommitteeForm" onsubmit="addCommitteeMember(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="memberName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="memberEmail" required placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="memberPassword" required placeholder="Enter password">
                        <button type="button" class="show-password-btn" onclick="togglePassword('memberPassword', this)"
                            title="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="memberConfirmPassword" required placeholder="Confirm password">
                        <button type="button" class="show-password-btn"
                            onclick="togglePassword('memberConfirmPassword', this)" title="Show password">👁️</button>
                    </div>
                </div>
                <div id="addMemberError" style="color:#e74c3c;font-size:0.9rem;margin-bottom:12px;display:none;"></div>
                <button type="submit" class="submit-btn">Add Committee Member</button>
            </form>
        </div>
    </div>
    <!-- Edit User Modal -->
    <div class="modal" id="editUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit User</h3>
                <button class="close-btn" onclick="closeModal('editUserModal')">&times;</button>
            </div>
            <form id="editUserForm" onsubmit="updateUser(event)">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="editRole">
                        <option value="victim">Victim</option>
                        <option value="committee">Committee Member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="active">Active</option>
                        <option value="blocked">Blocked</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Update User</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    <script src="../js/api.js"></script>
    <script src="manage-users.js"></script>
</body>

</html>
