<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="audit-logs.css">
</head>
<body>
    <div class="module-container">
        <div class="module-header">
            <h2><i class="fas fa-history"></i> Audit Logs</h2>
            <div class="header-actions">
                <button class="btn-primary" onclick="exportLogs()">
                    <i class="fas fa-download"></i> Export Logs
                </button>
                <button class="btn-secondary" onclick="clearFilters()">
                    <i class="fas fa-undo"></i> Clear Filters
                </button>
            </div>
        </div>

        <!-- Advanced Filters -->
        <div class="filters-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>Date Range:</label>
                    <select id="dateRange" onchange="applyFilters()">
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="week" selected>Last 7 Days</option>
                        <option value="month">Last 30 Days</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>User Type:</label>
                    <select id="userType" onchange="applyFilters()">
                        <option value="all">All Users</option>
                        <option value="admin">Admin</option>
                        <option value="committee">Committee</option>
                        <option value="victim">Victim</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Action Type:</label>
                    <select id="actionType" onchange="applyFilters()">
                        <option value="all">All Actions</option>
                        <option value="login">Login/Logout</option>
                        <option value="create">Create</option>
                        <option value="update">Update</option>
                        <option value="delete">Delete</option>
                        <option value="assign">Assignment</option>
                        <option value="escalate">Escalation</option>
                        <option value="block">Block/Unblock</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Status:</label>
                    <select id="status" onchange="applyFilters()">
                        <option value="all">All</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="warning">Warning</option>
                    </select>
                </div>
            </div>
            
            <div class="filter-row" id="customDateRow" style="display: none;">
                <div class="filter-group">
                    <label>From:</label>
                    <input type="datetime-local" id="startDate">
                </div>
                <div class="filter-group">
                    <label>To:</label>
                    <input type="datetime-local" id="endDate">
                </div>
                <button onclick="applyCustomDate()" class="apply-btn">Apply</button>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search logs..." onkeyup="searchLogs()">
            </div>
        </div>

        <!-- Log Statistics -->
        <div class="log-stats">
            <div class="stat-item">
                <span class="stat-label">Total Events:</span>
                <span class="stat-value" id="totalEvents">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Success:</span>
                <span class="stat-value success" id="successCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Failed:</span>
                <span class="stat-value failed" id="failedCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Warnings:</span>
                <span class="stat-value warning" id="warningCount">0</span>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="logs-container">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>User Type</th>
                        <th>Action</th>
                        <th>Details</th>
                        <th>IP Address</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <!-- Logs will be loaded here -->
                </tbody>
            </table>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Log Details Modal -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Log Details</h3>
                <button class="close-btn" onclick="closeModal('logModal')">&times;</button>
            </div>
            <div id="logDetails" class="log-details">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="audit-logs.js"></script>
</body>
</html>
