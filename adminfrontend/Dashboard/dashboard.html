<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Harassment Grievance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <span>Admin Dashboard</span>
        </div>
        <div class="user-menu">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-cog"></i>
                </div>
                <div>
                    <div id="adminName">Michael Brown</div>
                    <small>Administrator</small>
                </div>
            </div>
            <div class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li class="active" onclick="loadModule('dashboard')">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </li>
                <li onclick="loadModule('manage-users')">
                    <i class="fas fa-users-cog"></i>
                    <span>Manage Users</span>
                </li>
                <li onclick="loadModule('assign-committee')">
                    <i class="fas fa-user-tie"></i>
                    <span>Assign Committee</span>
                </li>
                <li onclick="loadModule('monitor-escalations')">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Monitor Escalations</span>
                </li>
                <li onclick="loadModule('view-reports')">
                    <i class="fas fa-chart-bar"></i>
                    <span>View Reports</span>
                </li>
                <li onclick="loadModule('audit-logs')">
                    <i class="fas fa-history"></i>
                    <span>Audit Logs</span>
                </li>
            </ul>
        </div>

        <div class="main-content" id="mainContent">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
